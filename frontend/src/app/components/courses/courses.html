<div style="height: 100vh; background-color: #030712; padding: 20px; font-family: 'Segoe UI', system-ui, sans-serif; direction: rtl; color: #f3f4f6; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; width: 100%; margin: 0 auto 20px auto; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; flex-shrink: 0;">
    <h2 class="brand-logo" style="margin: 0; font-size: 26px;">LEARNING AI PLATFORM</h2>
    <div style="display: flex; gap: 15px; align-items: center;">
      <span style="color: #38bdf8; font-weight: 600; font-size: 14px;">⚡ מנוע יצירתי מבוסס AI</span>
    </div>
  </div>

  <div style="max-width: 1200px; width: 100%; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 30px; items: start; flex-grow: 1; min-height: 0;">
    
    <div style="display: flex; flex-direction: column; height: 100%; min-height: 0;">
      <div style="background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(56, 189, 248, 0.15); border-radius: 20px; padding: 25px; backdrop-filter: blur(12px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); flex-shrink: 0;">
        <h3 style="color: #ffffff; margin-top: 0; font-size: 19px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">💻 הגדרת תוכן השיעור</h3>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
          <div>
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #9ca3af; font-size: 14px;">נושא מרכזי</label>
            <select [(ngModel)]="selectedCategoryId" (change)="onCategoryChange()" style="width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 15px; background-color: #1f2937; color: #ffffff; outline: none;">
              <option value=""> לחץ לבחירה </option>
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
            </select>
          </div>

          <div>
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #9ca3af; font-size: 14px;">תת-נושא ממוקד</label>
            <select [(ngModel)]="selectedSubCategoryId" [disabled]="!selectedCategoryId" style="width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 15px; background-color: #1f2937; color: #ffffff; outline: none;">
              <option value=""> לחץ לבחירה </option>
              <option *ngFor="let sub of filteredSubCategories" [value]="sub.id">{{ sub.name }}</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #9ca3af; font-size: 14px;">על מה תרצה לקבל הסבר נרחב?</label>
          <textarea [(ngModel)]="userPrompt" placeholder="הקלד כאן מה בדיוק תרצה לדעת..." rows="3" style="width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 15px; box-sizing: border-box; resize: none; background-color: #1f2937; color: #ffffff; outline: none; line-height: 1.6;"></textarea>
        </div>

        <button (click)="createLesson()" [disabled]="isLoading" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); transition: all 0.3s;">
          {{ isLoading ? '🤖 המערכת מנתחת ומפיקה הסבר מקיף...' : 'CREATE LESSON ENGINE' }}
        </button>
      </div>

      <div *ngIf="aiExplanation" style="margin-top: 20px; background: #111827; border-right: 4px solid #38bdf8; border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05); overflow-y: auto; flex-grow: 1; min-height: 0;">
        <h3 style="margin-top: 0; color: #38bdf8; font-size: 17px; font-weight: 700; margin-bottom: 12px;">💡 ניתוח והסבר מורחב:</h3>
        <div style="white-space: pre-line; line-height: 1.8; font-size: 15.5px; color: #e5e7eb; text-align: justify;">
          {{ aiExplanation }}
        </div>
      </div>
    </div>

    <div style="background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); backdrop-filter: blur(12px); height: 100%; box-sizing: border-box; overflow-y: auto;">
      <h4 style="color: #9ca3af; margin-top: 0; font-size: 14px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">⏱️ היסטוריית הלמידה שלי</h4>
      
      <div *ngIf="myHistory && myHistory.length > 0; else noHistory">
        <div *ngFor="let item of myHistory" (click)="aiExplanation = item.response; userPrompt = item.prompt" style="background: #1f2937; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; cursor: pointer; border: 1px solid transparent; color: #e5e7eb; transition: all 0.2s;" onmouseover="this.style.borderColor='#38bdf8'; this.style.background='#111827'" onmouseout="this.style.borderColor='transparent'; this.style.background='#1f2937'">
          <div style="font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">💬 "{{ item.prompt }}"</div>
          <div style="color: #6b7280; font-size: 11px;">{{ item.created_at | date:'dd/MM/yyyy HH:mm' }}</div>
        </div>
      </div>
      
      <ng-template #noHistory>
        <div style="color: #4b5563; font-size: 13px; text-align: center; padding: 20px 0;">טרם נוצרו שיעורים במערכת.</div>
      </ng-template>
    </div>

  </div>
</div>
