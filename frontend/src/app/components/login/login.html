<div style="height: 100vh; width: 100vw; background-color: #030712; display: flex; justify-content: center; align-items: flex-start; padding-top: 6vh; font-family: 'Segoe UI', system-ui, sans-serif; direction: rtl; box-sizing: border-box; overflow: hidden;">
  
  <div style="width: 100%; max-width: 400px; background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(56, 189, 248, 0.15); border-radius: 24px; padding: 35px 30px; backdrop-filter: blur(16px); box-shadow: 0 25px 50px rgba(0,0,0,0.6); text-align: center;">
    
    <h2 class="brand-logo" style="font-size: 28px; margin-bottom: 5px; margin-top: 0;">LEARNING AI</h2>
    <p style="color: #9ca3af; font-size: 14px; margin-top: 0; margin-bottom: 25px;">התחבר למערכת הלמידה המתקדמת</p>

    <div style="text-align: right;">
      <div style="margin-bottom: 18px;">
        <label style="display: block; margin-bottom: 8px; color: #9ca3af; font-size: 13.5px; font-weight: 600;">כתובת אימייל</label>
        <input type="email" value="chanishulevitz@gmail.com" placeholder="הקלד את כתובת האימייל שלך" style="width: 100%; padding: 13px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: #1f2937; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box; transition: border-color 0.3s;" onfocus="this.style.borderColor='#38bdf8'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
      </div>

      <div style="margin-bottom: 22px;">
        <label style="display: block; margin-bottom: 8px; color: #9ca3af; font-size: 13.5px; font-weight: 600;">סיסמה סודית</label>
        <input type="password" value="12345678" placeholder="הקלד את הסיסמה שלך" style="width: 100%; padding: 13px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: #1f2937; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box; transition: border-color 0.3s;" onfocus="this.style.borderColor='#38bdf8'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
      </div>

      <button (click)="onLogin()" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25); transition: all 0.3s;">
        התחבר למערכת
      </button>
    </div>

    <div style="margin-top: 25px; font-size: 13px; color: #6b7280;">
      טרם נרשמת לפלטפורמה? <a href="#" style="color: #38bdf8; text-decoration: none; font-weight: 600;">צור חשבון חדש</a>
    </div>

  </div>
</div>
