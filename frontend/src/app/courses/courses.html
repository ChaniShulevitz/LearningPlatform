<div style="max-width: 900px; margin: 40px auto; padding: 20px; font-family: sans-serif; direction: rtl;">
  
  <div style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px;">
    <h2 style="color: #1e293b; margin-top: 0; margin-bottom: 25px; font-size: 24px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">📚 יצירת שיעור והסבר מותאם אישית</h2>
    
    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #475569;">1. בחרי נושא ראשי:</label>
      <select [(ngModel)]="selectedCategoryId" (change)="onCategoryChange()" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; background: #f8fafc;">
        <option value="">-- לחצי לבחירה --</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #475569;">2. בחרי תת-נושא ספציפי:</label>
      <select [(ngModel)]="selectedSubCategoryId" [disabled]="!selectedCategoryId" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; background: #f8fafc;">
        <option value="">-- לחצי לבחירה --</option>
        <option *ngFor="let sub of filteredSubCategories" [value]="sub.id">{{ sub.name }}</option>
      </select>
    </div>

    <div style="margin-bottom: 25px;">
      <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #475569;">3. הקלידי את השאלה או הנושא להרחבה:</label>
      <textarea [(ngModel)]="userPrompt" placeholder="כתבי כאן מה בדיוק תרצי לדעת או לקבל עליו הסבר מפורט..." rows="4" style="width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; resize: none;"></textarea>
    </div>

    <button (click)="createLesson()" [disabled]="isLoading" style="width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
      {{ isLoading ? '🤖 המערכת מייצרת הסבר מפורט... אנא המתיני...' : '🔍 צור שיעור והצג הסבר' }}
    </button>
  </div>

  <div *ngIf="aiExplanation" style="background-color: #ffffff; border: 1px solid #cbd5e1; border-top: 6px solid #2563eb; border-radius: 12px; padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    <h3 style="margin-top: 0; color: #1e293b; font-size: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px;">📖 חומר לימודי והסבר מפורט:</h3>
    <div style="white-space: pre-wrap; line-height: 1.8; font-size: 16px; color: #334155;">
      {{ aiExplanation }}
    </div>
  </div>

</div>
